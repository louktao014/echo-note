<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.content }}</p>
  <small>{{ data.date | date : 'medium' }}</small>
</mat-dialog-content>
<div class="history-btn-container">
  <mat-dialog-actions>
    <button mat-button (click)="onCopyToClipboard()">Copy</button>
  </mat-dialog-actions>
  <mat-dialog-actions>
    <button mat-button (click)="closeDialog()">Close</button>
  </mat-dialog-actions>
</div>
