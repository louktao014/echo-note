<div class="transcript-container">
  <h2>Transcript</h2>

  @if (isEditing()) {
  <textarea class="transcript-textarea" [(ngModel)]="editedTranscript"></textarea>
  } @else {
  <div class="transcript-content">
    <p>{{ editedTranscript() }}</p>
  </div>
  }

  <div class="actions">
    <div class="btn-edit" (click)="toggleEditSave()">
      @if (isEditing()) {
      <span>Save</span>
      } @else {
      <span>Edit</span>
      }
    </div>
    <div class="btn-confirm" (click)="proceed()">Confirm & Proceed</div>
  </div>
</div>
