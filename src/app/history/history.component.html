<div class="history-container">
  <header>
    <div class="header-content">
      <h2>History</h2>
      <p>Your past transcriptions</p>
    </div>
    <button class="export-button" (click)="exportHistory()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      Export ALL
    </button>
  </header>

  @if (history().length > 0) {
  <div class="notes-grid">
    @for (item of history(); track item) {
    <div class="note-card" (click)="openDialog(item)">
      <p class="note-content">{{ item?.sub_ject }}</p>
      <button
        class="delete-button"
        (click)="removeItem(item); $event.stopPropagation()"
        aria-label="Delete item"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6"></polyline>
          <path
            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          ></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
    }
  </div>
  } @else {
  <div class="empty-history">
    <p>No history yet.</p>
    <span>Your transcribed notes will appear here.</span>
  </div>
  }
</div>
