<div class="mom-result-container">
  <div class="notion-page">
    <div class="page-content">
      <h1 class="page-title" contenteditable="true" spellcheck="false">Minutes of Meeting</h1>
      <div
        class="page-body"
        [attr.contenteditable]="isEdit()"
        spellcheck="false"
        [innerText]="mom()"
        (input)="onChangeMoM($event)"
      ></div>
    </div>
  </div>
  <div class="btn-container">
    <div class="input-subject">
      <input
        type="text"
        id="subject-input"
        placeholder="Enter a subject for this meeting..."
        class="subject-input"
        #subjectInput
      />
    </div>
    <div class="btn-copy" (click)="onCopyToClipboard()">COPY</div>
    <div class="btn-copy" (click)="onEdit('edit')">Edit</div>
    @if (isEdit()) {
      <div class="btn-copy" (click)="onEdit('save')">Save</div>
    } @else {
      <div class="btn-copy" (click)="onSave(subjectInput.value || '')">Save Transcript</div>
    }
  </div>
</div>
